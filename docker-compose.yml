services:

  bot:
    build: .
    container_name: aegis-bot
    env_file:
      - .env
    restart: unless-stopped
    network_mode: bridge
    command: python bot.py

  dashboard:
    build: .
    container_name: aegis-dashboard
    env_file:
      - .env
    restart: unless-stopped
    network_mode: bridge
    command: streamlit run dashboard.py --server.address 0.0.0.0
    ports:
      - "8501:8501"